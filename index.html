<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПР 9</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Практична робота 9</h1>
    </header>
    
    <main class="container">
<section class="card">
    <h2>Карта</h2>
    <div class="iframe-container">
        <iframe src="https://maps.google.com/maps?q=50.745612458487216,25.33817346062554&z=15&output=embed" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
</section>

        <section class="card">
            <h2>Відео</h2>
            <div class="iframe-container">
               <iframe src="https://www.youtube.com/embed/qrO4YZeyl0I" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </section>

        <section class="card">
            <h2>Аудіо</h2>
            <div class="audio-group">
                <div class="audio-item">
                    <h3>Файл</h3>
                    <audio controls>
                        <source src="The Fame.mp3" type="audio/mpeg">
                    </audio>
                </div>
                <div class="audio-item">
                    <h3>Spotify Віджет</h3>
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0SiywuOBRcynK0uKGWdCnn?si=f13b3cf9eb1f4025" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Годинник</h2>
            <div style="text-align: center; margin-top: auto; padding-bottom: 20px;">
                <span id="local-clock" style="font-size:42px; font-weight:bold; color:#2c3e50; font-family: monospace;"></span>
                <script>
                    function updateClock() {
                        const now = new Date();
                        const timeString = now.toLocaleTimeString('uk-UA', { 
                            timeZone: 'Europe/Kyiv',
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit'
                        });
                        document.getElementById('local-clock').innerText = timeString;
                    }
                    setInterval(updateClock, 1000);
                    updateClock(); 
                </script>
            </div>
        </section>
    </main>
</body>
</html>
